services:
  database:
    container_name: proposal-screener-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  database:
  redis_data:
  minio_data:

networks:
  app_network:
    driver: bridge
